<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noleto Delivery - FN (Final Audio Edition)</title> 
    <style> 
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #1a1a1a; overflow: hidden; font-family: Arial, sans-serif; } 
        canvas { border: 4px solid #333; background-color: #f0f0f0; max-width: 100%; max-height: 100%; box-shadow: 0 0 30px rgba(0,0,0,0.7); } 
    </style> 
</head> 
<body> 
    <canvas id="gameCanvas" width="400" height="400"></canvas> 
    <script> 
        const canvas = document.getElementById("gameCanvas"); 
        const ctx = canvas.getContext("2d"); 
 
        // --- SISTEMA DE ÁUDIO (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let engineOsc = null, engineGain = null, audioStarted = false;

        function startAudio() {
            if (audioStarted) return;
            audioStarted = true;
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            
            // --- ALTERAÇÃO 1: SOM DO MOTOR MAIS SUAVE ---
            engineOsc.type = 'triangle'; // Mudado de 'sawtooth' para 'triangle' (onda muito mais suave)
            engineGain.gain.value = 0.02; // Reduzi o volume de 0.04 para 0.02
            
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }

        function playHorn(freq = 440, duration = 0.1) {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // Variáveis Globais
        let frames = 0, gameOver = false, baseSpeed = 3, gameSpeed = baseSpeed, bgOffset = 0, score = 0, distance = 0; 
        let nextSpawnDistance = 70, lastSpawnDistance = 0, startTime = Date.now(), recordDistance = localStorage.getItem("motoboyRecord") || 0;
        const obstacles = [], coins = [], nysChips = [], lanes = [305, 335, 365];
        const obstacleTypes = ["🚗", "🚚", "🚌", "🏍️", "🚲", "🛑"];

        class Obstacle {
            constructor(laneY) { this.type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)]; this.size = 40; this.x = canvas.width; this.y = laneY; this.speed = gameSpeed; }
            update() { this.x -= this.speed; }
            draw() { ctx.save(); ctx.font = `${this.size}px Arial`; ctx.textBaseline = "top"; if (this.type !== "🛑" && this.type !== "🚲" && this.type !== "🏍️") { ctx.scale(-1, 1); ctx.fillText(this.type, -this.x - this.size, this.y); } else { ctx.fillText(this.type, this.x, this.y); } ctx.restore(); }
        }
        class Coin {
            constructor(laneY) { this.size = 25; this.x = canvas.width; this.y = laneY + (40 - this.size) / 2; this.speed = gameSpeed; }
            update() { this.x -= this.speed; }
            draw() { ctx.font = `${this.size}px Arial`; ctx.textBaseline = "top"; ctx.fillText("🪙", this.x, this.y); }
        }
        class NysChip {
            constructor(laneY) { this.size = 30; this.x = canvas.width; this.y = laneY + (40 - this.size) / 2; this.speed = gameSpeed; }
            update() { this.x -= this.speed; }
            draw() { ctx.font = `${this.size}px Arial`; ctx.textBaseline = "top"; ctx.fillText("🤖", this.x, this.y); }
        }

        const player = { x: 50, y: lanes[1], currentLane: 1, size: 40, speed: 5, emoji: "🛵", isInvincible: false, invincibleTimer: 0 }; 
        const keys = {}; 
        window.addEventListener("keydown", e => { keys[e.key] = true; startAudio(); }); 
        window.addEventListener("keyup", e => keys[e.key] = false); 
        
        canvas.addEventListener("touchstart", e => { 
            if (gameOver) document.location.reload(); 
            e.preventDefault(); startAudio(); 
            const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left; 
            const visualW = canvas.getBoundingClientRect().width; 
            if (touchX < visualW / 2) { if (player.currentLane > 0) { player.currentLane--; player.y = lanes[player.currentLane]; } } 
            else { if (player.currentLane < lanes.length - 1) { player.currentLane++; player.y = lanes[player.currentLane]; } } 
        });

        function drawBackground() {
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height - 100);
            gradient.addColorStop(0, "#87CEEB"); gradient.addColorStop(1, "#f0f8ff");
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height - 100);
            ctx.fillStyle = "#FFD700"; ctx.beginPath(); ctx.arc(320, 80, 40, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#666"; ctx.fillRect(20, 150, 60, 150); ctx.fillRect(90, 100, 80, 200); ctx.fillRect(180, 120, 70, 180); ctx.fillRect(260, 80, 90, 220);
            ctx.fillStyle = "#333"; ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
            ctx.fillStyle = "#FFFFFF"; ctx.setLineDash([20, 15]); ctx.lineDashOffset = -bgOffset;
            ctx.beginPath(); ctx.moveTo(0, canvas.height - 50); ctx.lineTo(canvas.width, canvas.height - 50);
            ctx.lineWidth = 4; ctx.strokeStyle = "#FFFFFF"; ctx.stroke(); ctx.setLineDash([]);
        }

        function update() { 
            if (gameOver) { if (engineGain) engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); return; }
            let level = Math.floor(distance / 10); 
            gameSpeed = baseSpeed + (level * 0.05); 
            bgOffset += gameSpeed; distance += gameSpeed * 0.1;
            if (bgOffset >= 35) bgOffset = 0; frames++;

            // Ajuste da frequência do motor para acompanhar a suavidade
            if (engineOsc) engineOsc.frequency.setTargetAtTime(30 + (gameSpeed * 4), audioCtx.currentTime, 0.1);
            if (player.isInvincible) { player.invincibleTimer--; if (player.invincibleTimer <= 0) player.isInvincible = false; }

            if (distance - lastSpawnDistance > nextSpawnDistance) {
                lastSpawnDistance = distance;
                nextSpawnDistance = Math.max(25, 70 - (level * 0.2)); 
                let avail = [0, 1, 2];
                let double = (Math.random() < Math.min(0.8, 0.4 + (level * 0.01)));
                for(let i = 0; i < (double ? 2 : 1); i++) { if(avail.length > 0) obstacles.push(new Obstacle(lanes[avail.splice(Math.floor(Math.random() * avail.length), 1)[0]])); }
                
                if (avail.length > 0 && Math.random() < 0.5) {
                    let numCoins = (avail.length > 1 && Math.random() < 0.3) ? 2 : 1;
                    for(let j = 0; j < numCoins; j++) { coins.push(new Coin(lanes[avail.splice(Math.floor(Math.random() * avail.length), 1)[0]])); }
                }
                else if (avail.length > 0 && Math.random() < 0.04) nysChips.push(new NysChip(lanes[avail[Math.floor(Math.random() * avail.length)]]));
            }

            for (let i = 0; i < coins.length; i++) {
                let c = coins[i]; c.update();
                if (player.x < c.x + c.size && player.x + player.size - 10 > c.x && player.y < c.y + c.size && player.y + player.size - 10 > c.y) {
                    score += 1; playHorn(880, 0.05); coins.splice(i, 1); i--; continue;
                }
                if (c.x + c.size < 0) { coins.splice(i, 1); i--; }
            }
            for (let i = 0; i < nysChips.length; i++) {
                let ch = nysChips[i]; ch.update();
                if (player.x < ch.x + ch.size && player.x + player.size - 10 > ch.x && player.y < ch.y + ch.size && player.y + player.size - 10 > ch.y) {
                    player.isInvincible = true; player.invincibleTimer = 300; playHorn(1200, 0.2); nysChips.splice(i, 1); i--; continue;
                }
                if (ch.x + ch.size < 0) { nysChips.splice(i, 1); i--; }
            }
            for (let i = 0; i < obstacles.length; i++) {
                let o = obstacles[i]; o.update();
                if (player.x < o.x + o.size - 12 && player.x + player.size - 12 > o.x && player.y < o.y + o.size - 12 && player.y + player.size - 12 > o.y) {
                    if (!player.isInvincible) {
                        gameOver = true; playHorn(150, 0.5);
                        if (distance > recordDistance) { localStorage.setItem("motoboyRecord", Math.floor(distance)); recordDistance = Math.floor(distance); }
                    } else { obstacles.splice(i, 1); i--; }
                }
                if (o.x + o.size < 0) { obstacles.splice(i, 1); i--; }
            }

            if (keys["ArrowUp"] && player.currentLane > 0) { player.currentLane--; player.y = lanes[player.currentLane]; keys["ArrowUp"] = false; } 
            if (keys["ArrowDown"] && player.currentLane < lanes.length - 1) { player.currentLane++; player.y = lanes[player.currentLane]; keys["ArrowDown"] = false; } 
            if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed; if (keys["ArrowRight"] && player.x < canvas.width - player.size) player.x += player.speed; 
        } 
 
        function draw() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); drawBackground();
            coins.forEach(c => c.draw()); nysChips.forEach(ch => ch.draw()); obstacles.forEach(o => o.draw());
            if (player.isInvincible) { ctx.save(); ctx.beginPath(); ctx.arc(player.x + player.size/2 - 5, player.y + player.size/2, player.size/1.2, 0, Math.PI*2); ctx.fillStyle = "rgba(0, 255, 255, 0.3)"; ctx.fill(); ctx.strokeStyle = "cyan"; ctx.lineWidth = 3; ctx.stroke(); ctx.fillStyle = "cyan"; ctx.fillRect(player.x - 5, player.y - 15, (player.invincibleTimer / 300) * (player.size + 10), 6); ctx.restore(); }
            ctx.save(); ctx.font = `${player.size}px Arial`; ctx.textBaseline = "top"; ctx.scale(-1, 1); ctx.fillText(player.emoji, -player.x - player.size, player.y); ctx.restore();
            ctx.fillStyle = "black"; ctx.font = "bold 20px Arial"; ctx.textAlign = "left"; ctx.fillText(`🪙 Moedas: ${score}`, 10, 25);
            let timeElapsed = Math.floor(((gameOver ? startTime + frames * 16.6 : Date.now()) - startTime) / 1000);
            let min = Math.floor(timeElapsed / 60).toString().padStart(2, '0'), sec = (timeElapsed % 60).toString().padStart(2, '0');
            ctx.textAlign = "right"; ctx.font = "16px Arial"; ctx.fillText(`⏱️ Tempo: ${min}:${sec}`, canvas.width - 10, 20); ctx.fillText(`🏁 Distância: ${(distance / 1000).toFixed(2)} km`, canvas.width - 10, 40);
            ctx.fillStyle = "#d00"; ctx.fillText(`🏆 Recorde: ${(recordDistance / 1000).toFixed(2)} km`, canvas.width - 10, 60);
            
            // --- ALTERAÇÃO 2: MENSAGEM DE GAME OVER LIMPA ---
            if (gameOver) { 
                ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; 
                ctx.fillRect(0, 0, canvas.width, canvas.height); 
                ctx.fillStyle = "white"; 
                ctx.textAlign = "center"; 
                
                // Apenas GAME OVER
                ctx.font = "bold 40px Arial"; 
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20); 
                
                // Apenas Toque na tela
                ctx.font = "20px Arial"; 
                ctx.fillText("Toque na tela", canvas.width / 2, canvas.height / 2 + 30); 
            }
        } 
        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); } 
        gameLoop(); 
    </script> 
</body> 
</html>
