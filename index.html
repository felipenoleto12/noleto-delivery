<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noleto Delivery - FN (Mobile Edition)</title> 
    <style> 
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #1a1a1a; overflow: hidden; font-family: Arial, sans-serif; touch-action: none; } 
        canvas { border: 4px solid #333; background-color: #f0f0f0; max-width: 100%; max-height: 100%; box-shadow: 0 0 30px rgba(0,0,0,0.7); } 
    </style> 
</head> 
<body> 
    <canvas id="gameCanvas" width="400" height="400"></canvas> 
    <script> 
        const canvas = document.getElementById("gameCanvas"); 
        const ctx = canvas.getContext("2d"); 

        // --- ASSETS ---
        const imgJogador = new Image(); imgJogador.src = 'assets/jogador.png';
        const imgCarro = new Image(); imgCarro.src = 'assets/carro.png';
        const imgCaminhao = new Image(); imgCaminhao.src = 'assets/caminhao.png';
        const imgOnibus = new Image(); imgOnibus.src = 'assets/onibus.png';
        const imgMotoboy1 = new Image(); imgMotoboy1.src = 'assets/motoboy.png';
        const imgMotoboy2 = new Image(); imgMotoboy2.src = 'assets/motoboy2.png';
        const imgMotoboy3 = new Image(); imgMotoboy3.src = 'assets/motoboy3.png';
        const imgMoeda = new Image(); imgMoeda.src = 'assets/moeda.png';
        const imgPredio = new Image(); imgPredio.src = 'assets/predio.png';

        // --- SISTEMA DE ÁUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let engineOsc = null, engineGain = null, audioStarted = false;

        function startAudio() {
            if (audioStarted) return;
            audioStarted = true;
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            engineOsc.type = 'triangle';
            engineGain.gain.value = 0.02;
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }

        function playHorn(freq, duration, type = 'square', vol = 0.05) {
            if (!audioStarted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        // --- LOGICA DE PERSISTÊNCIA (BANCO DE DADOS) ---
        let gameState = "menu"; // Estados: "menu" ou "playing"
        let totalCoins = parseInt(localStorage.getItem("noletoTotalCoins")) || 0;
        let recordDistance = localStorage.getItem("motoboyRecord") || 0;

        // Variáveis de Jogo
        let frames = 0, gameOver = false, baseSpeed = 3, gameSpeed = baseSpeed, bgOffset = 0, score = 0, distance = 0; 
        let nextSpawnDistance = 90, lastSpawnDistance = 0, startTime = Date.now();
        const obstacles = [], coins = [], lanes = [260, 310, 360]; 

        const obstacleTypes = [
            { type: 'carro', img: imgCarro, w: 55, h: 35, horn: () => playHorn(400, 0.2) },
            { type: 'caminhao', img: imgCaminhao, w: 75, h: 50, horn: () => playHorn(150, 0.4, 'sawtooth') },
            { type: 'onibus', img: imgOnibus, w: 85, h: 45, horn: () => playHorn(120, 0.5, 'sawtooth') },
            { type: 'moto', img: imgMotoboy1, w: 45, h: 45, horn: () => playHorn(800, 0.1) },
            { type: 'moto', img: imgMotoboy2, w: 45, h: 45, horn: () => playHorn(850, 0.1) },
            { type: 'moto', img: imgMotoboy3, w: 45, h: 45, horn: () => playHorn(750, 0.1) }
        ];

        class Obstacle {
            constructor(laneY) { 
                const config = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                this.img = config.img; this.w = config.w; this.h = config.h;
                this.x = canvas.width; this.y = laneY - (this.h / 2);
                this.speed = gameSpeed;
                config.horn();
            }
            update() { this.x -= this.speed; }
            draw() { 
                ctx.save(); ctx.translate(this.x + this.w, this.y); ctx.scale(-1, 1);
                ctx.drawImage(this.img, 0, 0, this.w, this.h); ctx.restore();
            }
        }

        class Coin {
            constructor(laneY) { this.w = 25; this.h = 25; this.x = canvas.width; this.y = laneY - (this.h / 2); this.speed = gameSpeed; }
            update() { this.x -= this.speed; }
            draw() { ctx.drawImage(imgMoeda, this.x, this.y, this.w, this.h); }
        }

        const player = { x: 50, y: lanes[1], currentLane: 1, w: 50, h: 50, speed: 5 }; 
        const keys = {}; 
        window.addEventListener("keydown", e => { keys[e.key] = true; }); 
        window.addEventListener("keyup", e => keys[e.key] = false); 
        
        canvas.addEventListener("touchstart", e => { 
            e.preventDefault();
            const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left; 
            const visualW = canvas.getBoundingClientRect().width; 

            if (gameState === "menu") {
                // Inicia o jogo ao tocar em qualquer lugar do menu
                gameState = "playing";
                startAudio();
                return;
            }

            if (gameOver) {
                document.location.reload(); 
                return;
            }

            if (touchX < visualW / 2) { if (player.currentLane > 0) { player.currentLane--; player.y = lanes[player.currentLane]; } } 
            else { if (player.currentLane < lanes.length - 1) { player.currentLane++; player.y = lanes[player.currentLane]; } } 
        });

        function drawBackground() {
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, 250); 
            ctx.drawImage(imgPredio, 0, 50, canvas.width, 200); // Fundo FN fixo
            ctx.fillStyle = "#333"; ctx.fillRect(0, 250, canvas.width, 150); // Estrada
            ctx.fillStyle = "#FFFFFF"; ctx.setLineDash([20, 15]); ctx.lineDashOffset = -bgOffset;
            ctx.beginPath(); ctx.moveTo(0, 300); ctx.lineTo(canvas.width, 300); ctx.moveTo(0, 350); ctx.lineTo(canvas.width, 350);
            ctx.lineWidth = 2; ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke(); ctx.setLineDash([]);
        }

        function drawMenu() {
            // Desenha o fundo e o prédio no menu também
            drawBackground();
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 32px Arial";
            ctx.fillText("NOLETO DELIVERY", canvas.width / 2, 100);

            ctx.font = "18px Arial";
            ctx.fillText(`💰 Total: ${totalCoins} moedas`, canvas.width / 2, 150);
            ctx.fillText(`🏆 Recorde: ${(recordDistance / 1000).toFixed(2)} km`, canvas.width / 2, 180);

            // Botão Visual
            ctx.fillStyle = "#FFD700";
            ctx.roundRect(100, 250, 200, 50, 10);
            ctx.fill();
            ctx.fillStyle = "black";
            ctx.font = "bold 18px Arial";
            ctx.fillText("INICIAR ENTREGA", canvas.width / 2, 282);
            
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText("Toque na tela para começar", canvas.width / 2, 330);
        }

        function update() { 
            if (gameState === "menu" || gameOver) return;

            let level = Math.floor(distance / 10); 
            gameSpeed = baseSpeed + (level * 0.05); 
            bgOffset += gameSpeed; distance += gameSpeed * 0.1;
            if (bgOffset >= 35) bgOffset = 0; frames++;

            if (engineOsc) engineOsc.frequency.setTargetAtTime(30 + (gameSpeed * 4), audioCtx.currentTime, 0.1);

            if (distance - lastSpawnDistance > nextSpawnDistance) {
                lastSpawnDistance = distance;
                nextSpawnDistance = Math.max(50, 100 - (level * 0.2)); 
                let avail = [0, 1, 2];
                let safeLane = avail.splice(Math.floor(Math.random() * avail.length), 1)[0]; 
                let numObstacles = (Math.random() < 0.6) ? 2 : 1;
                for(let i = 0; i < numObstacles; i++) {
                    if(avail.length > 0) {
                        let idx = Math.floor(Math.random() * avail.length);
                        obstacles.push(new Obstacle(lanes[avail[idx]]));
                        avail.splice(idx, 1);
                    }
                }
                if (Math.random() < 0.5) coins.push(new Coin(lanes[safeLane]));
            }

            // Colisões e Moedas
            for (let i = 0; i < obstacles.length; i++) {
                let o = obstacles[i]; o.update();
                if (player.x + 10 < o.x + o.w - 10 && player.x + player.w - 10 > o.x + 10 && 
                    player.y - 15 < o.y + o.h - 10 && player.y + 15 > o.y + 10) {
                    gameOver = true; playHorn(100, 0.8, 'sawtooth', 0.2);
                    if (distance > recordDistance) { localStorage.setItem("motoboyRecord", Math.floor(distance)); }
                }
                if (o.x + o.w < 0) { obstacles.splice(i, 1); i--; }
            }

            for (let i = 0; i < coins.length; i++) {
                let c = coins[i]; c.update();
                if (player.x < c.x + c.w && player.x + player.w > c.x && player.y - 20 < c.y + c.h && player.y + 20 > c.y) {
                    score++; 
                    totalCoins++;
                    localStorage.setItem("noletoTotalCoins", totalCoins); // Salva a moeda vitalícia
                    playHorn(900, 0.05, 'sine', 0.1); 
                    coins.splice(i, 1); i--;
                } else if (c.x + c.w < 0) { coins.splice(i, 1); i--; }
            }
        } 

        function draw() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            
            if (gameState === "menu") {
                drawMenu();
            } else {
                drawBackground();
                coins.forEach(c => c.draw()); obstacles.forEach(o => o.draw());
                ctx.drawImage(imgJogador, player.x, player.y - (player.h / 2), player.w, player.h);

                // HUD Jogando
                ctx.fillStyle = "black"; ctx.font = "bold 18px Arial"; ctx.textAlign = "left"; 
                ctx.fillText(`🪙 Moedas: ${score}`, 10, 30);
                ctx.textAlign = "right"; ctx.font = "14px Arial";
                ctx.fillText(`🏁 ${(distance / 1000).toFixed(2)} km`, canvas.width - 10, 30);
                
                if (gameOver) { 
                    ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height); 
                    ctx.fillStyle = "white"; ctx.textAlign = "center"; 
                    ctx.font = "bold 40px Arial"; ctx.fillText("GAME OVER", canvas.width / 2, 180); 
                    ctx.font = "20px Arial"; ctx.fillText("Toque para reiniciar", canvas.width / 2, 230); 
                }
            }
        } 
        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); } 
        gameLoop(); 
    </script> 
</body> 
</html>
